<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(to top, #ffd1dc, #fff);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

/* Name animation */
.name {
  position: absolute;
  top: 20%;
  font-size: 40px;
  color: #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff99aa; }
  to { text-shadow: 0 0 25px #ff4d6d; }
}

/* Typing text */
#text {
  position: absolute;
  top: 50%;
  font-size: 22px;
  color: #333;
  border-right: 2px solid black;
  white-space: nowrap;
  overflow: hidden;
}

/* Hearts */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
  content: '';
  width: 20px;
  height: 20px;
  background: red;
  position: absolute;
  border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes float {
  0% {
    bottom: -10%;
    opacity: 1;
    transform: translateX(0) rotate(45deg);
  }
  100% {
    bottom: 110%;
    opacity: 0;
    transform: translateX(100px) rotate(45deg);
  }
}
</style>
</head>

<body>

<div class="name">THAWAI ❤️</div>

<div id="text"></div>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
// Typing effect
const message = "Hey... I'm really sorry 🥺 I care about you a lot. Please talk to me ❤️";
let i = 0;

function typing() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// Floating hearts
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
